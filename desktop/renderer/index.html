<!doctype html>
<html data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <link rel="stylesheet" href="styles.css">
  <title>Oyster</title>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <svg width="27" height="27" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 26 V23 Q16 14 32 14 Q48 14 48 23 V26"/><path d="M16 38 V41 Q16 50 32 50 Q48 50 48 41 V38"/><circle cx="32" cy="32" r="5.4" fill="currentColor" stroke="none"/></svg>
      <span class="name">Oyster</span>
    </div>
    <div class="nav-label">SCAN</div>
    <nav id="nav-scan"></nav>
    <div class="nav-label">TOOLS</div>
    <nav id="nav-tools"></nav>
    <div class="nav-label">REPORT</div>
    <nav id="nav-report"></nav>
    <div class="spacer"></div>
    <div class="seg">
      <button class="seg-btn" data-mode="light">Light</button>
      <button class="seg-btn active" data-mode="dark">Dark</button>
    </div>
  </aside>

  <main class="main">
    <div class="topdrag"></div>
    <header class="header">
      <div class="grow"><h1 class="h1" id="h-title">Files</h1><p class="sub" id="h-sub"></p></div>
      <div class="model-chip" id="model-chip">model · …</div>
    </header>
    <div class="scanbar panel hidden" id="scanbar"></div>
    <div id="content" style="flex:1;min-height:0;display:flex;flex-direction:column;"></div>
    <div class="status" id="status">Ready.</div>
  </main>

  <!-- preflight gate -->
  <div class="gate" id="gate">
    <div class="card panel">
      <h2>Welcome to Oyster</h2>
      <div class="g-sub">Grant the required permissions before scanning.</div>
      <div class="grow" id="gate-rows"></div>
      <div class="g-foot">
        <div class="gmsg" id="gate-msg"></div>
        <button class="btn ghost" id="gate-recheck">Re-check</button>
        <button class="btn primary" id="gate-launch">Launch Oyster</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
