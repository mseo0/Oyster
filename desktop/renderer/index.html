<!doctype html>
<html data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <link rel="stylesheet" href="styles.css">
  <title>Oyster</title>
</head>
<body>
  <!-- Windows-only custom title bar (hidden on macOS via .platform-win32 class) -->
  <div id="win-titlebar" class="win-titlebar">
    <div class="win-drag"></div>
    <div class="win-controls">
      <button class="win-btn" id="win-min" title="Minimize">
        <svg width="10" height="1" viewBox="0 0 10 1" fill="none"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="win-btn" id="win-max" title="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><rect x=".5" y=".5" width="9" height="9" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="win-btn win-close" id="win-close" title="Close">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.2"/></svg>
      </button>
    </div>
  </div>

  <aside class="sidebar">
    <div class="brand">
      <svg width="27" height="27" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 26 V23 Q16 14 32 14 Q48 14 48 23 V26"/><path d="M16 38 V41 Q16 50 32 50 Q48 50 48 41 V38"/><circle cx="32" cy="32" r="5.4" fill="currentColor" stroke="none"/></svg>
      <span class="name">Oyster</span>
    </div>
    <div class="nav-label">SCAN</div>
    <nav id="nav-scan"></nav>
    <button class="nav-btn full-scan-btn" id="full-scan-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>
      <span class="lbl">Full Scan</span>
    </button>
    <div class="nav-label">TOOLS</div>
    <nav id="nav-tools"></nav>
    <div class="nav-label">REPORT</div>
    <nav id="nav-report"></nav>
    <div class="spacer"></div>
    <div class="seg">
      <button class="seg-btn" data-mode="light">Light</button>
      <button class="seg-btn active" data-mode="dark">Dark</button>
    </div>
  </aside>

  <main class="main">
    <div class="topdrag"></div>
    <header class="header">
      <div class="grow"><h1 class="h1" id="h-title">Files</h1><p class="sub" id="h-sub"></p></div>
      <div class="model-chip" id="model-chip">model · …</div>
    </header>
    <div class="scanbar panel hidden" id="scanbar"></div>
    <div id="content" style="flex:1;min-height:0;display:flex;flex-direction:column;"></div>
    <div class="status" id="status">Ready.</div>
  </main>

  <!-- preflight gate -->
  <div class="gate" id="gate">
    <div class="card panel">
      <h2>Welcome to Oyster</h2>
      <div class="g-sub">Grant the required permissions before scanning.</div>
      <div class="grow" id="gate-rows"></div>
      <div class="g-foot">
        <div class="gmsg" id="gate-msg"></div>
        <button class="btn ghost" id="gate-recheck">Re-check</button>
        <button class="btn ghost hidden" id="gate-setup">Set up Oyster</button>
        <button class="btn primary" id="gate-launch">Launch Oyster</button>
      </div>
    </div>
  </div>

  <!-- cleanup review modal -->
  <div class="modal-bg hidden" id="review">
    <div class="modal panel">
      <div class="modal-head">
        <div><div class="modal-title" id="rv-title"></div><div class="modal-sub" id="rv-sub"></div></div>
        <button class="modal-x" id="rv-close">✕</button>
      </div>
      <div class="modal-tools" id="rv-tools"></div>
      <div class="modal-list" id="rv-list"></div>
      <div class="modal-foot" id="rv-foot"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
