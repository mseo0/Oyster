name: Windows installer (ClamAV bundled)

# Builds a SELF-CONTAINED Windows installer that ships ClamAV (binaries + the
# virus signature database) inside it — so Windows users don't have to install
# ClamAV separately. Larger download (~250–350 MB) but zero-setup detection.
# Published as `Oyster-Setup-x.y.z-full.exe` alongside the lean installers.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CLAMAV_VERSION: "1.4.2"   # bump as new ClamAV releases land

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Build engine sidecar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          python -m PyInstaller --noconfirm --clean packaging/engine.spec

      - name: Assemble ClamAV (binaries + virus database)
        shell: pwsh
        run: |
          $ver = "${{ env.CLAMAV_VERSION }}"
          $url = "https://github.com/Cisco-Talos/clamav/releases/download/clamav-$ver/clamav-$ver.win.x64.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile clamav.zip
          Expand-Archive clamav.zip -DestinationPath clamav_x -Force
          $src = (Get-ChildItem -Recurse -Filter clamscan.exe clamav_x | Select-Object -First 1).DirectoryName
          New-Item -ItemType Directory -Force -Path desktop/resources/clamav/db | Out-Null
          Copy-Item "$src/*" desktop/resources/clamav/ -Recurse -Force
          # minimal freshclam config -> download signatures into the bundled db dir
          $db = (Resolve-Path desktop/resources/clamav/db).Path
          Set-Content -Encoding ascii desktop/resources/clamav/freshclam.conf @"
          DatabaseDirectory $db
          DatabaseMirror database.clamav.net
          "@
          & desktop/resources/clamav/freshclam.exe --config-file=desktop/resources/clamav/freshclam.conf
          Write-Host "Bundled ClamAV:"; Get-ChildItem desktop/resources/clamav

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Build installer
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm install
          npm run dist:win

      - name: Tag artifact as -full
        shell: pwsh
        run: Get-ChildItem desktop/dist/*.exe | ForEach-Object {
          Rename-Item $_.FullName ($_.BaseName + "-full" + $_.Extension) }

      - uses: actions/upload-artifact@v4
        with:
          name: oyster-windows-clamav
          path: desktop/dist/*-full.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/*-full.exe
          draft: true
          body: |
            **Windows — ClamAV bundled** (`-full.exe`): self-contained, no
            separate ClamAV install needed. Larger download.
            If SmartScreen warns: **More info → Run anyway** (unsigned).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
